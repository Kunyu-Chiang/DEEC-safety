<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>周报管理 - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 20px; background: #f5f7fa; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        h2 { margin: 0; color: #003366; }
        .filters { display: flex; gap: 15px; align-items: center; }
        select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { padding: 8px 15px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-outline { background: #fff; border: 1px solid #0066cc; color: #0066cc; }
        .content { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: #fff; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; }
        .link-detail { color: #0066cc; cursor: pointer; text-decoration: underline; }
        .chart-box { height: 300px; }
    </style>
</head>
<body>
    <div class="header" style="max-width: 1160px; margin: 0 auto 20px;">
        <h2>📋 管理后台：周报数据汇总</h2>
        <div class="filters">
            <label>年份：</label><select id="filterYear"></select>
            <label>周次：</label><select id="filterWeek"></select>
            <button class="btn" onclick="loadData()">查询</button>
            <button class="btn btn-outline" onclick="location.href='select.html'">返回首页</button>
        </div>
    </div>

    <div class="content">
        <div class="panel">
            <h3 style="margin-top:0">各项目提交列表</h3>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>项目名称</th><th>周期</th><th>填报人</th><th>发现隐患</th><th>操作</th></tr></thead>
                    <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;color:#999">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
        <div class="panel">
            <h3 style="margin-top:0">隐患统计</h3>
            <div id="chartPie" class="chart-box"></div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        let myChart = null;

        function initFilters() {
            const yearSel = document.getElementById('filterYear');
            const weekSel = document.getElementById('filterWeek');
            const now = new Date();
            for(let y=now.getFullYear(); y>=2024; y--) {
                const opt = document.createElement('option'); opt.value = y; opt.innerText = y + '年'; yearSel.appendChild(opt);
            }
            for(let w=1; w<=52; w++) {
                const opt = document.createElement('option'); opt.value = w; opt.innerText = '第' + w + '周'; weekSel.appendChild(opt);
            }
            const d = new Date();
            const start = new Date(d.getFullYear(), 0, 1);
            const day = Math.floor((d - start) / (1000 * 60 * 60 * 24)) + 1;
            weekSel.value = Math.ceil(day / 7);
        }

        window.addEventListener('DOMContentLoaded', () => {
            initFilters();
            myChart = echarts.init(document.getElementById('chartPie'));
            loadData();
        });

        async function loadData() {
            const year = document.getElementById('filterYear').value;
            const week = document.getElementById('filterWeek').value;
            const weekStr = `${year}年第${week}周`;

            const { data: reports } = await supabase.from('safety_weekly_report').select('*').like('report_week', `${weekStr}%`);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let totalDanger = 0, totalRect = 0;

            if(!reports || reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999">本周暂无数据</td></tr>';
            } else {
                reports.forEach(r => {
                    totalDanger += r.hidden_danger_found_count || 0;
                    totalRect += r.hidden_danger_rectified_count || 0;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${r.project_name}</td>
                        <td>${r.report_week}</td>
                        <td>${r.reporter || '-'}</td>
                        <td style="color:#d9534f; font-weight:bold">${r.hidden_danger_found_count || 0}</td>
                        <td><span class="link-detail" onclick="location.href='detail_weekly.html?id=${r.id}'">查看详情</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            myChart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    name: '隐患状态', type: 'pie', radius: ['40%', '70%'],
                    data: [
                        { value: totalRect, name: '已整改', itemStyle: { color: '#52c41a' } },
                        { value: totalDanger - totalRect, name: '待整改', itemStyle: { color: '#faad14' } }
                    ]
                }]
            });
        }
    </script>
</body>
</html>
