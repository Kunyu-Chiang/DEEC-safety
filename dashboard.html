<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>东方电气安全管理指挥中心 - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #030d28;
            color: #fff; 
            font-family: "Microsoft YaHei", sans-serif; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header { 
            height: 90px; 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="100%" height="90" xmlns="http://www.w3.org/2000/svg"><path d="M0,0 L40%%,0 L42%%,30 L58%%,30 L60%%,0 L100%%,0 L100%%,90 L0,90 Z" fill="%23001a4a" opacity="0.9"/></svg>') no-repeat center top;
            background-size: 100% 90px;
            z-index: -1;
        }
        h1 { 
            font-size: 36px; 
            letter-spacing: 6px; 
            color: #00d4ff; 
            text-shadow: 0 0 20px #00d4ff;
            font-weight: 800;
            margin-top: -10px;
        }
        .time-box { position: absolute; right: 40px; top: 25px; text-align: right; }
        .time { font-size: 28px; font-family: 'Courier New', monospace; color: #ffd700; }
        .date { font-size: 14px; color: #ccc; margin-top: 5px; }
        .exit-btn { 
            position: absolute; left: 40px; top: 30px; 
            padding: 8px 20px; 
            background: rgba(0,212,255,0.1); 
            border: 1px solid rgba(0,212,255,0.5); 
            color: #00d4ff; 
            cursor: pointer; 
            border-radius: 4px;
        }
        .container { 
            display: grid; 
            grid-template-columns: 380px 1fr 380px; 
            gap: 20px; 
            padding: 0 20px 20px 20px; 
            height: calc(100vh - 100px); 
        }
        .panel { 
            background: rgba(0, 30, 80, 0.35); 
            border: 1px solid #004a8f; 
            border-radius: 6px; 
            padding: 15px; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .panel::before, .panel::after {
            content: ''; position: absolute; width: 12px; height: 12px; border: 2px solid #00d4ff;
        }
        .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .panel::after { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .panel-corner::before, .panel-corner::after {
            content: ''; position: absolute; width: 12px; height: 12px; border: 2px solid #00d4ff;
        }
        .panel-corner::before { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .panel-corner::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        
        .panel-title { 
            font-size: 16px; 
            color: #00d4ff; 
            border-left: 4px solid #00d4ff; 
            padding-left: 12px; 
            margin-bottom: 15px; 
            font-weight: bold;
            background: linear-gradient(90deg, rgba(0,212,255,0.15), transparent);
            line-height: 28px;
        }
        .col-left { display: flex; flex-direction: column; gap: 20px; }
        .col-center { display: flex; flex-direction: column; gap: 20px; }
        .col-right { display: flex; flex-direction: column; gap: 20px; }
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .kpi-card { 
            background: rgba(0, 100, 200, 0.15); 
            padding: 15px 10px; 
            text-align: center; 
            border-radius: 6px; 
            border: 1px solid rgba(0,212,255,0.2);
        }
        .kpi-value { font-size: 26px; font-weight: bold; font-family: 'Courier New', monospace; }
        .kpi-label { font-size: 12px; color: #a0c4e8; margin-top: 5px; }
        .c1 { color: #00d4ff; } .c2 { color: #ffd700; } .c3 { color: #52c41a; } .c4 { color: #ff6b6b; }
        .map-box { flex: 2; min-height: 0; }
        .trend-box { flex: 1; min-height: 0; }
        .chart-small { flex: 1; width: 100%; min-height: 200px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-bg"></div>
        <button class="exit-btn" onclick="location.href='select.html'">◀ 返回管理中心</button>
        <h1>东方电气安全管理指挥中心</h1>
        <div class="time-box">
            <div class="time" id="clock">00:00:00</div>
            <div class="date" id="dateStr">2026年01月01日</div>
        </div>
    </div>

    <div class="container">
        <div class="col-left">
            <div class="panel" style="flex: 1;">
                <div class="panel-corner"></div>
                <div class="panel-title">📊 安全关键指标</div>
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-value c1" id="kpiProject">0</div><div class="kpi-label">活跃项目数</div></div>
                    <div class="kpi-card"><div class="kpi-value c2" id="kpiHidden">0</div><div class="kpi-label">累计发现隐患</div></div>
                    <div class="kpi-card"><div class="kpi-value c3" id="kpiRect">0</div><div class="kpi-label">已整改完成</div></div>
                    <div class="kpi-card"><div class="kpi-value c4" id="kpiRate">0%</div><div class="kpi-label">整改率</div></div>
                </div>
                <div style="margin-top: 15px; flex: 1; min-height: 180px;"><div id="chartPie" style="width: 100%; height: 100%;"></div></div>
            </div>
        </div>

        <div class="col-center">
            <div class="panel map-box">
                <div class="panel-corner"></div>
                <div class="panel-title">🗺️ 项目安全分布地图</div>
                <div id="chartMap" style="width: 100%; height: 100%;"></div>
            </div>
            <div class="panel trend-box">
                <div class="panel-corner"></div>
                <div class="panel-title">📈 安全趋势图</div>
                <div id="chartLine" style="width: 100%; height: 100%;"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="panel" style="flex: 1;">
                <div class="panel-corner"></div>
                <div class="panel-title">🎯 项目类型画像</div>
                <div id="chartRadar" class="chart-small"></div>
            </div>
            <div class="panel" style="height: 180px;">
                <div class="panel-corner"></div>
                <div class="panel-title">🔔 系统消息</div>
                <div id="msgList" style="font-size:13px; color:#ffcccb; line-height:2; overflow: hidden; height: 100px;">
                    <p>ℹ️ 正在连接数据库...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user || (user.role !== 'admin' && user.role !== 'manager')) {
            alert('您没有权限访问此页面');
            location.href='select.html';
        }

        let charts = {};
        window.projMap = {};

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('dateStr').innerText = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日';
        }, 1000);

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            if(!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const val = Math.floor(progress * (end - start) + start);
                if(id === 'kpiRate') obj.innerText = val + '%';
                else obj.innerText = val;
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            initCharts();
            await loadAllData();
            subscribeRealtime();
        });

        function initCharts() {
            charts.pie = echarts.init(document.getElementById('chartPie'));
            charts.map = echarts.init(document.getElementById('chartMap'));
            charts.line = echarts.init(document.getElementById('chartLine'));
            charts.radar = echarts.init(document.getElementById('chartRadar'));
            window.onresize = () => { Object.values(charts).forEach(c => c.resize()); };
        }

        async function loadAllData() {
            addMsg('ℹ️ 正在刷新数据...');
            const { data: weeklyData } = await window.supabaseClient.from('safety_weekly_report').select('*');
            const { data: projects } = await window.supabaseClient.from('projects').select('*');
            
            window.projMap = {};
            let totalDanger = 0, totalRect = 0, projectCount = 0;

            if(weeklyData) {
                weeklyData.forEach(r => {
                    projectCount++;
                    const d = r.hidden_danger_found_count || 0;
                    const rect = r.hidden_danger_rectified_count || 0;
                    totalDanger += d; totalRect += rect;
                    if(!window.projMap[r.project_name]) window.projMap[r.project_name] = 0;
                    window.projMap[r.project_name] += d;
                });
            }

            animateValue('kpiProject', 0, projectCount, 1000);
            animateValue('kpiHidden', 0, totalDanger, 1000);
            animateValue('kpiRect', 0, totalRect, 1000);
            const rate = totalDanger > 0 ? Math.round((totalRect/totalDanger)*100) : 100;
            animateValue('kpiRate', 0, rate, 1000);

            // 饼图
            charts.pie.setOption({
                tooltip: { trigger: 'item' },
                legend: { top: '0%', textStyle: { color: '#fff' } },
                series: [{
                    name: '隐患状态', type: 'pie', radius: ['45%', '70%'], center: ['50%', '60%'],
                    data: [
                        { value: totalRect, name: '已整改', itemStyle: { color: '#52c41a' } },
                        { value: totalDanger - totalRect, name: '待整改', itemStyle: { color: '#faad14' } }
                    ]
                }]
            });

            // 地图
            const mapData = (projects || []).map(p => ({
                name: p.project_name,
                value: [p.lng || 104.07, p.lat || 30.57, window.projMap[p.project_name] || 0]
            }));

            charts.map.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item', formatter: '{b}<br/>隐患数: {c}' },
                geo: {
                    map: 'china', roam: true, zoom: 1.5, center: [103.8, 31.2],
                    label: { show: true, color: 'rgba(255,255,255,0.5)' },
                    itemStyle: { areaColor: '#001a4a', borderColor: '#00d4ff' },
                    emphasis: { itemStyle: { areaColor: '#003366' } }
                },
                series: [{
                    type: 'scatter', coordinateSystem: 'geo',
                    symbolSize: (val) => 20 + val[2] * 3,
                    data: mapData.map(item => ({
                        name: item.name,
                        value: item.value,
                        itemStyle: { color: item.value[2] > 5 ? '#ff6b6b' : '#00d4ff' }
                    })),
                    label: { show: true, formatter: '{b}', position: 'right', color: '#fff' }
                }]
            });

            // 折线图
            charts.line.setOption({
                tooltip: { trigger: 'axis' },
                grid: { top: '10%', bottom: '15%', left: '10%', right: '10%' },
                xAxis: { type: 'category', data: ['第1周', '第2周', '第3周', '第4周', '本周'], axisLine: { lineStyle: { color: '#00d4ff' } }, axisLabel: { color: '#fff' } },
                yAxis: { type: 'value', splitLine: { lineStyle: { color: 'rgba(0,212,255,0.1)' } }, axisLabel: { color: '#fff' } },
                series: [{
                    name: '隐患数', type: 'line', smooth: true,
                    data: [15, 12, 18, 10, totalDanger],
                    lineStyle: { color: '#ffd700', width: 3 }, itemStyle: { color: '#ffd700' }
                }]
            });

            // 雷达图
            charts.radar.setOption({
                radar: {
                    indicator: [
                        { name: '人员配置', max: 100 },
                        { name: '培训力度', max: 100 },
                        { name: '设备完好', max: 100 },
                        { name: '应急能力', max: 100 },
                        { name: '隐患治理', max: 100 }
                    ],
                    axisName: { color: '#00d4ff' },
                    splitArea: { areaStyle: { color: 'rgba(0,212,255,0.05)' } }
                },
                series: [{
                    type: 'radar',
                    data: [{ value: [80, 90, 70, 85, rate], name: '安全指数', areaStyle: { opacity: 0.3 }, lineStyle: { color: '#00d4ff' } }]
                }]
            });

            addMsg('✅ 数据同步完成');
        }

        function subscribeRealtime() {
            addMsg('🔗 实时通道已连接');
            window.supabaseClient
                .channel('public:safety_weekly_report')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'safety_weekly_report' }, () => {
                    addMsg('⚡ 收到新数据，自动刷新...');
                    loadAllData();
                })
                .subscribe();
        }

        function addMsg(msg) {
            const list = document.getElementById('msgList');
            const p = document.createElement('p');
            p.innerText = msg;
            list.prepend(p);
            if(list.children.length > 5) list.removeChild(list.lastChild);
        }
    </script>
</body>
</html>
