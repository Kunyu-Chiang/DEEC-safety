<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全管理系统-登录</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { 
            min-height: 100vh; 
            background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 420px;
            background: #fff;
            border-radius: 12px;
            padding: 40px 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .logo-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-title h1 {
            color: #003366;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .logo-title p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: border 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
        }
        .login-btn {
            width: 100%;
            height: 48px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #004c99;
        }
        .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-title">
            <h1>东方设计安全管理信息系统</h1>
            <p>安全管理信息填报</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" required placeholder="请输入登录账号">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="请输入登录密码">
            </div>
            <button type="submit" class="login-btn">登录系统</button>
            <div class="error-msg" id="errorMsg">账号或密码错误，请重新输入</div>
        </form>
    </div>

    <script>
        // ========== 替换成你自己的Supabase配置 ==========
        const SUPABASE_URL = "https://zmbxpsbxxjrsdzyvtiyi.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7zW8CxAae1sFTxNLqaSjTA_nkCkzD8T";
        // ==============================================

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            // 清空错误提示
            errorMsg.style.display = 'none';

            // 验证账号密码
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password)
                .single();

            if (error || !data) {
                errorMsg.style.display = 'block';
                return;
            }

            // 登录成功，保存用户信息到本地
            localStorage.setItem('currentUser', JSON.stringify(data));
            // 跳转到选择页
            window.location.href = 'select.html';
        });
    </script>
</body>
</html>
