<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>月报详情</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 30px; background: #f5f7fa; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; }
        .header-bar { display: flex; justify-content: space-between; border-bottom: 2px solid #003366; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-back { padding: 8px 15px; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; background: #f5f5f5; }
        .info { margin-bottom: 15px; font-size: 16px; }
        .label { color: #666; display: inline-block; width: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1 style="margin:0; color:#003366;">月报详情</h1>
            <button class="btn-back" onclick="history.back()">返回上一页</button>
        </div>
        <div id="content"></div>
    </div>

    <script>
        const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

        window.addEventListener('DOMContentLoaded', async () => {
            const id = getParam('id');
            const { data } = await supabase.from('safety_monthly_main').select('*').eq('id', id).single();
            if(!data) { document.getElementById('content').innerText = '未找到'; return; }
            document.getElementById('content').innerHTML = `
                <div class="info"><span class="label">项目名称：</span> <strong>${data.project_name}</strong></div>
                <div class="info"><span class="label">报告月份：</span> ${data.report_month}</div>
                <div class="info"><span class="label">填报人：</span> ${data.reporter}</div>
                <div class="info"><span class="label">培训次数：</span> ${data.training_count || 0}</div>
                <div class="info" style="margin-top:20px;"><span class="label">工作概述：</span></div>
                <div style="background:#f9f9f9; padding:15px; border-radius:4px; margin-top:10px;">${data.work_overview || '无'}</div>
            `;
        });
    </script>
</body>
</html>
