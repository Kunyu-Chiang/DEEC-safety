<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全管理系统-公司汇总看板</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background-color: #f5f7fa; padding: 20px; }
        .header { 
            background: linear-gradient(90deg, #003366, #0066cc);
            color: #fff; padding: 20px 30px;
            border-radius: 8px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .header h1 { font-size: 22px; }
        .btn-group button { 
            background: rgba(255,255,255,0.2); border: 1px solid #fff3;
            color: #fff; padding: 8px 15px; border-radius: 4px;
            cursor: pointer; margin-left: 10px; transition: all 0.3s;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.3); }
        .filter-bar { 
            background: #fff; padding: 15px 20px; border-radius: 8px;
            margin-bottom: 20px; display: flex; gap: 20px; align-items: center;
            flex-wrap: wrap; box-shadow: 0 2px 10px #0001;
        }
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .filter-group label { color: #333; font-weight: 500; }
        .filter-group input, .filter-group select { 
            padding: 8px 12px; border: 1px solid #ddd;
            border-radius: 4px; font-size: 14px;
        }
        .filter-btn { 
            background: #0066cc; color: #fff; border: none;
            padding: 8px 20px; border-radius: 4px; cursor: pointer;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .dashboard-cards { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-bottom: 20px;
        }
        .card { 
            background: #fff; padding: 25px; border-radius: 8px;
            box-shadow: 0 2px 10px #0001; display: flex;
            justify-content: space-between; align-items: center;
        }
        .card-info h3 { color: #666; font-size: 14px; margin-bottom: 8px; }
        .card-info p { color: #003366; font-size: 28px; font-weight: bold; }
        .card-icon { 
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff;
        }
        .card-warning { background: #fff3cd; }
        .card-danger { background: #f8d7da; }
        .charts-row { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px; margin-bottom: 20px;
        }
        .chart-box { 
            background: #fff; padding: 20px; border-radius: 8px;
            box-shadow: 0 2px 10px #0001;
        }
        .chart-box h3 { color: #003366; margin-bottom: 15px; font-size: 16px; }
        .chart-container { width: 100%; height: 350px; }
        .table-section { 
            background: #fff; padding: 20px; border-radius: 8px;
            box-shadow: 0 2px 10px #0001; margin-bottom: 20px;
        }
        .table-section h3 { color: #003366; margin-bottom: 15px; font-size: 16px; }
        .table-box { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { border: 1px solid #ddd; padding: 10px 12px; font-size: 13px; text-align: left; }
        table th { background: #f0f5ff; color: #003366; font-weight: 600; }
        .status-red { color: #dc3545; font-weight: bold; }
        .status-yellow { color: #ffc107; font-weight: bold; }
        .status-green { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>东方设计安全管理信息系统-公司汇总看板</h1>
            <div class="btn-group">
                <button id="backBtn">返回选择页</button>
                <button id="logoutBtn">退出登录</button>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label>统计月份</label>
                <input type="month" id="filterMonth" value="">
            </div>
            <div class="filter-group">
                <label>项目类型</label>
                <select id="filterProjectType">
                    <option value="">全部</option>
                    <option value="光伏EPC">光伏EPC</option>
                    <option value="风电EPC">风电EPC</option>
                    <option value="储能EPC">储能EPC</option>
                    <option value="改造EPC">改造EPC</option>
                    <option value="综合智慧能源EPC">综合智慧能源EPC</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <button class="filter-btn" id="filterBtn">查询</button>
        </div>

        <div class="dashboard-cards">
            <div class="card">
                <div class="card-info">
                    <h3>本月项目填报率</h3>
                    <p id="cardFillRate">--%</p>
                </div>
                <div class="card-icon" style="background: #0066cc;">📊</div>
            </div>
            <div class="card">
                <div class="card-info">
                    <h3>累计排查隐患总数</h3>
                    <p id="cardTotalDanger">--</p>
                </div>
                <div class="card-icon" style="background: #28a745;">⚠️</div>
            </div>
            <div class="card" id="cardRectifyRateBox">
                <div class="card-info">
                    <h3>隐患整改闭环率</h3>
                    <p id="cardRectifyRate">--%</p>
                </div>
                <div class="card-icon" style="background: #ffc107;">✅</div>
            </div>
            <div class="card" id="cardMajorDangerBox">
                <div class="card-info">
                    <h3>重大隐患存量</h3>
                    <p id="cardMajorDanger">--</p>
                </div>
                <div class="card-icon" style="background: #dc3545;">🚨</div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-box">
                <h3>近6个月隐患数量趋势</h3>
                <div id="trendChart" class="chart-container"></div>
            </div>
            <div class="chart-box">
                <h3>隐患等级分布</h3>
                <div id="levelChart" class="chart-container"></div>
            </div>
        </div>
        <div class="charts-row">
            <div class="chart-box">
                <h3>各项目隐患数量排名</h3>
                <div id="rankChart" class="chart-container"></div>
            </div>
            <div class="chart-box">
                <h3>事故/事件类型分布</h3>
                <div id="typeChart" class="chart-container"></div>
            </div>
        </div>

        <div class="table-section">
            <h3>项目填报进度管理</h3>
            <div class="table-box">
                <table id="fillProgressTable">
                    <thead>
                        <tr>
                            <th>项目名称</th><th>项目类型</th><th>本月月报状态</th>
                            <th>本周周报状态</th><th>填报人</th><th>最新填报时间</th>
                        </tr>
                    </thead>
                    <tbody id="fillProgressTbody">
                        <tr><td colspan="6" style="text-align: center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="table-section">
            <h3>全公司隐患排查治理汇总台账</h3>
            <div class="table-box">
                <table id="dangerSummaryTable">
                    <thead>
                        <tr>
                            <th>所属项目</th><th>隐患描述</th><th>隐患等级</th><th>排查时间</th>
                            <th>整改措施</th><th>整改期限</th><th>整改状态</th><th>责任人</th>
                        </tr>
                    </thead>
                    <tbody id="dangerSummaryTbody">
                        <tr><td colspan="8" style="text-align: center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局配置 ==========
        const SUPABASE_URL = "https://zmbxpsbxxjrsdzyvtiyi.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7zW8CxAae1sFTxNLqaSjTA_nkCkzD8T";
        
        window.isProcessing = false;
        window.currentUser = null;
        window.supabaseClient = null;
        let trendChart, levelChart, rankChart, typeChart;

        // ========== 初始化 ==========
        window.addEventListener('DOMContentLoaded', async function() {
            try {
                const { createClient } = window.supabase;
                window.supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) { console.error('Supabase初始化失败：', e); alert('系统初始化失败，请刷新重试'); return; }

            try {
                const userStr = localStorage.getItem('currentUser');
                if (!userStr) { alert('未检测到登录信息，请重新登录'); window.location.href = 'index.html'; return; }
                window.currentUser = JSON.parse(userStr);
                
                const { data: userData, error: userErr } = await window.supabaseClient
                    .from('users')
                    .select('role')
                    .eq('id', window.currentUser.id)
                    .single();
                if (userErr || !userData || userData.role !== 'admin') {
                    alert('您没有权限访问汇总页，请联系管理员');
                    window.location.href = 'select.html';
                    return;
                }
            } catch (e) {
                console.error('权限校验失败：', e);
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
                return;
            }

            initCharts();

            document.getElementById('backBtn').addEventListener('click', function() { if (window.isProcessing) return; window.location.href = 'select.html'; });
            document.getElementById('logoutBtn').addEventListener('click', function() { if (window.isProcessing) return; localStorage.removeItem('currentUser'); window.location.href = 'index.html'; });
            document.getElementById('filterBtn').addEventListener('click', loadAllData);

            const now = new Date();
            const defaultMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            document.getElementById('filterMonth').value = defaultMonth;

            loadAllData();
        });

        function initCharts() {
            trendChart = echarts.init(document.getElementById('trendChart'));
            levelChart = echarts.init(document.getElementById('levelChart'));
            rankChart = echarts.init(document.getElementById('rankChart'));
            typeChart = echarts.init(document.getElementById('typeChart'));
            window.addEventListener('resize', function() {
                trendChart.resize(); levelChart.resize(); rankChart.resize(); typeChart.resize();
            });
        }

        async function loadAllData() {
            if (window.isProcessing) return;
            window.isProcessing = true;
            try {
                await loadDashboardCards();
                await loadChartData();
                await loadFillProgress();
                await loadDangerSummary();
            } catch (e) { console.error('数据加载失败：', e); alert('数据加载失败：' + e.message); }
            finally { window.isProcessing = false; }
        }

        // ========== 1. 加载驾驶舱（真实查询） ==========
        async function loadDashboardCards() {
            try {
                // 1.1 总项目数
                const { count: totalProjects, error: err1 } = await window.supabaseClient
                    .from('users')
                    .select('*', { count: 'exact', head: true })
                    .eq('role', 'user');
                if (err1) throw err1;

                // 1.2 本月已填报项目数
                const filterMonth = document.getElementById('filterMonth').value;
                const { count: filledProjects, error: err2 } = await window.supabaseClient
                    .from('safety_monthly_main')
                    .select('*', { count: 'exact', head: true })
                    .like('report_month', filterMonth + '%');
                if (err2) throw err2;

                // 1.3 隐患总数
                const { count: totalDanger, error: err3 } = await window.supabaseClient
                    .from('safety_attachment2_hazard_check')
                    .select('*', { count: 'exact', head: true });
                if (err3) throw err3;

                // 1.4 已整改隐患数
                const { count: rectifiedDanger, error: err4 } = await window.supabaseClient
                    .from('safety_attachment2_hazard_check')
                    .select('*', { count: 'exact', head: true })
                    .eq('hazard_eliminated', true);
                if (err4) throw err4;

                // 1.5 重大隐患数
                const { count: majorDanger, error: err5 } = await window.supabaseClient
                    .from('safety_attachment2_hazard_check')
                    .select('*', { count: 'exact', head: true })
                    .eq('hazard_level', '重大隐患')
                    .eq('hazard_eliminated', false);
                if (err5) throw err5;

                // 填充指标
                const fillRate = totalProjects > 0 ? Math.round((filledProjects / totalProjects) * 100) : 0;
                const rectifyRate = totalDanger > 0 ? Math.round((rectifiedDanger / totalDanger) * 100) : 0;

                document.getElementById('cardFillRate').textContent = fillRate + '%';
                document.getElementById('cardTotalDanger').textContent = totalDanger;
                document.getElementById('cardRectifyRate').textContent = rectifyRate + '%';
                document.getElementById('cardMajorDanger').textContent = majorDanger;

                // 预警样式
                const rectifyBox = document.getElementById('cardRectifyRateBox');
                const majorBox = document.getElementById('cardMajorDangerBox');
                rectifyBox.className = rectifyRate < 90 ? 'card card-warning' : 'card';
                majorBox.className = majorDanger > 0 ? 'card card-danger' : 'card';

            } catch (e) { console.error('驾驶舱加载失败：', e); throw e; }
        }

        // ========== 2. 加载图表（模拟数据，可替换为真实查询） ==========
        async function loadChartData() {
            const trendData = {
                months: ['2025-10', '2025-11', '2025-12', '2026-01', '2026-02', '2026-03'],
                total: [25, 32, 28, 22, 18, 15],
                rectified: [22, 30, 26, 20, 17, 14]
            };
            const levelData = [
                { value: 105, name: '一般' },
                { value: 21, name: '较大' },
                { value: 2, name: '重大' }
            ];
            const rankData = {
                projects: ['光伏项目A', '风电项目B', '储能项目C', '改造项目D', '综合能源E'],
                counts: [35, 28, 25, 22, 18]
            };
            const typeData = [
                { value: 30, name: '高处坠落' },
                { value: 25, name: '物体打击' },
                { value: 20, name: '车辆伤害' },
                { value: 15, name: '触电' },
                { value: 38, name: '其他' }
            ];

            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['发现隐患数', '整改完成数'] },
                xAxis: { type: 'category', data: trendData.months },
                yAxis: { type: 'value' },
                series: [
                    { name: '发现隐患数', type: 'line', smooth: true, data: trendData.total, itemStyle: { color: '#0066cc' } },
                    { name: '整改完成数', type: 'line', smooth: true, data: trendData.rectified, itemStyle: { color: '#28a745' } }
                ]
            });

            levelChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: '0%' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: levelData,
                    itemStyle: { colors: ['#28a745', '#ffc107', '#dc3545'] }
                }]
            });

            rankChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: rankData.projects, axisLabel: { rotate: 30 } },
                yAxis: { type: 'value' },
                series: [{ type: 'bar', data: rankData.counts, itemStyle: { color: '#0066cc' } }]
            });

            typeChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: '0%' },
                series: [{ type: 'pie', radius: ['30%', '60%'], data: typeData }]
            });
        }

        // ========== 3. 加载填报进度（真实查询） ==========
        async function loadFillProgress() {
            const tbody = document.getElementById('fillProgressTbody');
            try {
                const { data: users, error: userErr } = await window.supabaseClient
                    .from('users')
                    .select('*')
                    .eq('role', 'user');
                if (userErr) throw userErr;

                const filterMonth = document.getElementById('filterMonth').value;
                const { data: monthlyReports, error: monthlyErr } = await window.supabaseClient
                    .from('safety_monthly_main')
                    .select('project_name, reporter, created_at')
                    .like('report_month', filterMonth + '%');
                if (monthlyErr) throw monthlyErr;

                const { data: weeklyReports, error: weeklyErr } = await window.supabaseClient
                    .from('safety_weekly_report')
                    .select('project_name, created_at')
                    .order('created_at', { ascending: false });
                if (weeklyErr) throw weeklyErr;

                const progressData = users.map(user => {
                    const monthlyFilled = monthlyReports?.some(r => r.project_name === user.project_name);
                    const weeklyFilled = weeklyReports?.some(r => r.project_name === user.project_name);
                    const lastReport = weeklyReports?.find(r => r.project_name === user.project_name);
                    
                    return {
                        project: user.project_name,
                        type: '其他',
                        monthly: monthlyFilled ? '已填报' : '未填报',
                        weekly: weeklyFilled ? '已填报' : '未填报',
                        reporter: monthlyReports?.find(r => r.project_name === user.project_name)?.reporter || '--',
                        time: lastReport?.created_at ? new Date(lastReport.created_at).toLocaleString() : '--'
                    };
                });

                tbody.innerHTML = progressData.map(item => `
                    <tr>
                        <td>${item.project}</td>
                        <td>${item.type}</td>
                        <td class="${item.monthly === '已填报' ? 'status-green' : 'status-red'}">${item.monthly}</td>
                        <td class="${item.weekly === '已填报' ? 'status-green' : 'status-red'}">${item.weekly}</td>
                        <td>${item.reporter}</td>
                        <td>${item.time}</td>
                    </tr>
                `).join('');

            } catch (e) { console.error('填报进度加载失败：', e); tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">加载失败</td></tr>'; throw e; }
        }

        // ========== 4. 加载隐患汇总（真实查询） ==========
        async function loadDangerSummary() {
            const tbody = document.getElementById('dangerSummaryTbody');
            try {
                const { data: dangers, error: dangerErr } = await window.supabaseClient
                    .from('safety_attachment2_hazard_check')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);
                if (dangerErr) throw dangerErr;

                tbody.innerHTML = (dangers || []).map(item => {
                    let levelClass = 'status-green';
                    let statusClass = 'status-green';
                    if (item.hazard_level === '较大隐患') levelClass = 'status-yellow';
                    if (item.hazard_level === '重大隐患') levelClass = 'status-red';
                    if (!item.hazard_eliminated) statusClass = 'status-yellow';
                    if (!item.hazard_eliminated && new Date(item.rectify_deadline) < new Date()) statusClass = 'status-red';

                    return `
                        <tr>
                            <td>${item.project_name || '--'}</td>
                            <td>${item.hazard_desc || '--'}</td>
                            <td class="${levelClass}">${item.hazard_level || '--'}</td>
                            <td>${item.check_date || '--'}</td>
                            <td>${item.rectify_desc || '--'}</td>
                            <td>${item.rectify_deadline || '--'}</td>
                            <td class="${statusClass}">${item.hazard_eliminated ? '已整改' : '未整改'}</td>
                            <td>${item.rectify_person || '--'}</td>
                        </tr>
                    `;
                }).join('');

            } catch (e) { console.error('隐患汇总加载失败：', e); tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">加载失败</td></tr>'; throw e; }
        }
    </script>
</body>
</html>
