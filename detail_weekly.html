<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>周报详情</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 30px; background: #f5f7fa; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; }
        .header-bar { display: flex; justify-content: space-between; border-bottom: 2px solid #003366; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { margin: 0; color: #003366; font-size: 22px; }
        .btn-back { padding: 8px 15px; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; background: #f5f5f5; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .info-item { background: #f9f9f9; padding: 15px; border-radius: 6px; }
        .info-label { color: #666; font-size: 13px; margin-bottom: 5px; }
        .info-value { color: #333; font-size: 16px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background: #f0f5ff; color: #003366; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1>周报详情</h1>
            <button class="btn-back" onclick="history.back()">返回上一页</button>
        </div>
        <div id="content" style="text-align:center; color:#999">加载中...</div>
    </div>

    <script>
        function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

        window.addEventListener('DOMContentLoaded', async () => {
            const id = getParam('id');
            if(!id) { document.getElementById('content').innerText = '缺少ID'; return; }
            
            const { data: report } = await window.supabaseClient.from('safety_weekly_report').select('*').eq('id', id).single();
            const { data: details } = await window.supabaseClient.from('weekly_danger_detail').select('*').eq('report_id', id).order('serial_number');
            
            if(!report) { document.getElementById('content').innerText = '未找到数据'; return; }

            let rowsHtml = '';
            if(details && details.length > 0) {
                details.forEach(d => {
                    rowsHtml += `<tr><td>${d.serial_number}</td><td>${d.danger_description}</td><td>${d.danger_level}</td><td>${d.treatment_description}</td><td>${d.treatment_deadline}</td><td>${d.verify_person}</td></tr>`;
                });
            } else {
                rowsHtml = '<tr><td colspan="6" style="text-align:center; color:#999">无隐患记录</td></tr>';
            }

            document.getElementById('content').innerHTML = `
                <div class="info-grid">
                    <div class="info-item"><div class="info-label">项目名称</div><div class="info-value">${report.project_name}</div></div>
                    <div class="info-item"><div class="info-label">周期</div><div class="info-value">${report.report_week}</div></div>
                    <div class="info-item"><div class="info-label">填报人</div><div class="info-value">${report.reporter || '-'}</div></div>
                </div>
                <h3 style="border-left:4px solid #0066cc; padding-left:10px;">安全数据</h3>
                <table>
                    <tr><th>检查次数</th><th>发现隐患</th><th>已整改</th><th>重大隐患</th></tr>
                    <tr><td>${report.safety_inspection_count || 0}</td><td>${report.hidden_danger_found_count || 0}</td><td>${report.hidden_danger_rectified_count || 0}</td><td>${report.major_hidden_danger_count || 0}</td></tr>
                </table>
                <h3 style="border-left:4px solid #0066cc; padding-left:10px; margin-top:30px;">隐患明细</h3>
                <table>
                    <tr><th>序号</th><th>隐患描述</th><th>等级</th><th>措施</th><th>期限</th><th>验证人</th></tr>
                    ${rowsHtml}
                </table>
            `;
        });
    </script>
</body>
</html>
