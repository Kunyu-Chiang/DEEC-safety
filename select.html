<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>功能选择</title>
    <style>
        body { padding: 40px; text-align: center; font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; margin: 0; }
        .section-title { text-align: left; max-width: 1000px; margin: 30px auto 10px; font-size: 18px; color: #333; font-weight: bold; border-left: 4px solid #0066cc; padding-left: 10px; }
        .card-container { max-width: 1000px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: flex-start; }
        .card { 
            width: 220px; padding: 30px 20px; background: #fff; border-radius: 8px; cursor: pointer; 
            transition: 0.3s; text-align: left; border: 1px solid #e8e8e8; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); transform: translateY(-3px); border-color: #0066cc; }
        h3 { color: #003366; margin: 0 0 8px 0; font-size: 18px; }
        p { color: #666; font-size: 14px; margin: 0; }
        .header { margin-bottom: 20px; background: #fff; padding: 20px; border-radius: 8px; max-width: 960px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; }
        .link-btn { color: #0066cc; cursor: pointer; text-decoration: none; font-size: 14px; }
        .link-btn:hover { text-decoration: underline; }
        .icon { font-size: 32px; margin-bottom: 10px; display: block; }
        .role-tag { background: #e6f7ff; color: #0066cc; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center;">
            <h1 style="margin:0; font-size:20px; color:#003366;">东方电气安全管理信息系统</h1>
            <span id="roleTag" class="role-tag"></span>
        </div>
        <div>
            <span id="userInfoSpan" style="color:#666; font-size:14px; margin-right:20px;"></span>
            <span class="link-btn" onclick="logout()">退出登录</span>
        </div>
    </div>

    <div class="section-title">工作台</div>
    <div class="card-container">
        <div class="card" onclick="location.href='weekly.html'">
            <span class="icon">📝</span>
            <h3>周报填报</h3>
            <p>新建/提交本周周报</p>
        </div>
        <div class="card" onclick="location.href='monthly.html'">
            <span class="icon">📊</span>
            <h3>月报填报</h3>
            <p>新建/提交本月月报</p>
        </div>
        <div class="card" onclick="location.href='my_history.html'">
            <span class="icon">📂</span>
            <h3>我的记录</h3>
            <p>查看历史提交记录</p>
        </div>
    </div>

    <div class="section-title" id="adminTitle" style="display:none">管理中心</div>
    <div class="card-container" id="adminCards" style="display:none">
        <div class="card" onclick="location.href='summary_weekly.html'">
            <span class="icon">📋</span>
            <h3>周报管理</h3>
            <p>查看全项目周报列表</p>
        </div>
        <div class="card" onclick="location.href='summary_monthly.html'">
            <span class="icon">📋</span>
            <h3>月报管理</h3>
            <p>查看全项目月报列表</p>
        </div>
        <div class="card" onclick="location.href='dashboard.html'">
            <span class="icon">🖥️</span>
            <h3>数据大屏</h3>
            <p>可视化指挥中心</p>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) { location.href='index.html'; }

        const roleText = user.role === 'admin' ? '系统管理员' : (user.role === 'manager' ? '项目经理' : '填报员');
        document.getElementById('userInfoSpan').innerText = `用户：${user.email} | 项目：${user.projects?.project_name || '未分配'}`;
        document.getElementById('roleTag').innerText = roleText;

        if(user.role === 'admin' || user.role === 'manager') {
            document.getElementById('adminTitle').style.display = 'block';
            document.getElementById('adminCards').style.display = 'flex';
        }

        async function logout() {
            await window.supabaseClient.auth.signOut();
            localStorage.clear();
            location.href='index.html';
        }
    </script>
</body>
</html>
