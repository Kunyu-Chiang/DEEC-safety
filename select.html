<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全管理系统-选择填报类型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { 
            min-height: 100vh; 
            background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .select-box {
            max-width: 500px;
            width: 100%;
            background: #fff;
            border-radius: 12px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .user-info {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .user-info h3 {
            color: #003366;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .user-info p {
            color: #666;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .select-btn {
            min-width: 160px;
            width: 45%;
            height: 60px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .select-btn:hover {
            background: #004c99;
            transform: translateY(-2px);
        }
        .select-btn:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }
        .logout-btn {
            margin-top: 30px;
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: #5a6268;
        }
        .loading-tip {
            color: #0066cc;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="select-box">
        <div class="user-info">
            <h3>欢迎登录！</h3>
            <p>当前用户：<span id="currentUserName"></span> | 所属项目：<span id="currentProject"></span></p>
        </div>
        <h2>请选择要填报的报表类型</h2>
        <div class="btn-group">
            <button class="select-btn" id="monthlyBtn">安全月报填报</button>
            <button class="select-btn" id="weeklyBtn">安全周报填报</button>
        </div>
        <div class="loading-tip" id="loadingTip">正在跳转，请稍候...</div>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>

    <script>
        let isNavigating = false;
        let currentUser = null;

        window.onload = function() {
            console.log('选择页加载中，校验登录状态...');
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
                return;
            }

            try {
                currentUser = JSON.parse(userStr);
                if (!currentUser.id || !currentUser.username || !currentUser.project_name) {
                    localStorage.removeItem('currentUser');
                    window.location.href = 'index.html';
                    return;
                }
                document.getElementById('currentUserName').innerText = currentUser.username;
                document.getElementById('currentProject').innerText = currentUser.project_name;

                // 绑定按钮事件
                document.getElementById('monthlyBtn').addEventListener('click', function() {
                    if (isNavigating) return;
                    isNavigating = true;
                    document.getElementById('monthlyBtn').disabled = true;
                    document.getElementById('loadingTip').style.display = 'block';
                    setTimeout(() => window.location.href = 'monthly.html', 300);
                });

                document.getElementById('weeklyBtn').addEventListener('click', function() {
                    if (isNavigating) return;
                    isNavigating = true;
                    document.getElementById('weeklyBtn').disabled = true;
                    document.getElementById('loadingTip').style.display = 'block';
                    setTimeout(() => window.location.href = 'weekly.html', 300);
                });

                document.getElementById('logoutBtn').addEventListener('click', function() {
                    if (isNavigating) return;
                    isNavigating = true;
                    localStorage.removeItem('currentUser');
                    window.location.href = 'index.html';
                });

            } catch (e) {
                console.error('用户信息解析失败：', e);
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
