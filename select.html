<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全管理系统-选择填报类型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { 
            min-height: 100vh; 
            background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .select-box {
            width: 500px;
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .user-info {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .user-info h3 {
            color: #003366;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .user-info p {
            color: #666;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .select-btn {
            width: 200px;
            height: 60px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .select-btn:hover {
            background: #004c99;
            transform: translateY(-2px);
        }
        .logout-btn {
            margin-top: 30px;
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="select-box">
        <div class="user-info">
            <h3>欢迎登录！</h3>
            <p>当前用户：<span id="currentUserName"></span> | 所属项目：<span id="currentProject"></span></p>
        </div>
        <h2>请选择要填报的报表类型</h2>
        <div class="btn-group">
            <button class="select-btn" onclick="goToMonthly()">
                安全月报填报
            </button>
            <button class="select-btn" onclick="goToWeekly()">
                安全周报填报
            </button>
        </div>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <script>
        // 页面加载验证登录（强制校验，无法绕过）
        window.onload = function() {
            // 1. 强制校验登录状态，无信息直接跳转登录页
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
                return;
            }

            // 2. 校验用户信息是否完整（防止篡改缓存）
            try {
                const currentUser = JSON.parse(userStr);
                if (!currentUser.id || !currentUser.username || !currentUser.project_name) {
                    localStorage.removeItem('currentUser');
                    window.location.href = 'login.html';
                    return;
                }
                // 3. 填充用户信息
                document.getElementById('currentUserName').innerText = currentUser.username;
                document.getElementById('currentProject').innerText = currentUser.project_name;
            } catch (e) {
                // 缓存格式错误，强制跳转登录
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        };

        // 跳转到月报页
        function goToMonthly() {
            window.location.href = 'monthly.html';
        }

        // 跳转到周报页
        function goToWeekly() {
            window.location.href = 'weekly.html';
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
