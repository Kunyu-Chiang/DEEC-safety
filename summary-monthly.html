<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>月报管理 - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 20px; background: #f5f7fa; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; max-width: 1160px; margin: 0 auto 20px; }
        h2 { margin: 0; color: #003366; }
        .filters { display: flex; gap: 15px; align-items: center; }
        input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { padding: 8px 15px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-outline { background: #fff; border: 1px solid #0066cc; color: #0066cc; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; }
        .link-detail { color: #0066cc; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📋 管理后台：月报数据汇总</h2>
        <div class="filters">
            <label>月份：</label><input type="month" id="filterMonth">
            <button class="btn" onclick="loadData()">查询</button>
            <button class="btn btn-outline" onclick="location.href='select.html'">返回首页</button>
        </div>
    </div>

    <div class="container">
        <table>
            <thead><tr><th>项目名称</th><th>月份</th><th>填报人</th><th>培训次数</th><th>提交时间</th><th>操作</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" style="text-align:center;color:#999">请选择月份查询...</td></tr></tbody>
        </table>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const mStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
            document.getElementById('filterMonth').value = mStr;
        });

        async function loadData() {
            const month = document.getElementById('filterMonth').value;
            if(!month) return;

            const { data } = await window.supabaseClient.from('safety_monthly_main').select('*').eq('report_month', month);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">本月暂无数据</td></tr>';
            } else {
                data.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${r.project_name}</td>
                        <td>${r.report_month}</td>
                        <td>${r.reporter || '-'}</td>
                        <td>${r.training_count || 0}</td>
                        <td>${new Date(r.created_at).toLocaleDateString()}</td>
                        <td><span class="link-detail" onclick="location.href='detail_monthly.html?id=${r.id}'">查看详情</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }
    </script>
</body>
</html>
