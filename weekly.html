<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全管理系统-周报填报</title>
    <!-- 固定HTTPS资源链接，适配Netlify HTTPS环境 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background-color: #f5f7fa; padding: 20px; }
        .header { 
            background: linear-gradient(90deg, #003366, #0066cc);
            color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { font-size: 22px; }
        .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .back-btn, .logout-btn { 
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .back-btn:hover, .logout-btn:hover { 
            background: rgba(255,255,255,0.3);
        }
        .back-btn:disabled, .logout-btn:disabled { 
            background: #999;
            cursor: not-allowed;
        }
        .container { max-width: 1200px; margin: 0 auto; width: 100%; }
        .section-title { 
            background: #e6f0ff;
            padding: 10px 15px;
            margin: 25px 0 15px 0;
            border-left: 5px solid #0066cc;
            font-weight: bold;
            color: #003366;
            font-size: 16px;
        }
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .table-box { width: 100%; overflow-x: auto; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { border: 1px solid #ddd; padding: 8px 10px; font-size: 13px; text-align: left; }
        table th { background: #f0f5ff; color: #003366; font-weight: 600; }
        .add-row-btn { 
            background: #28a745;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        .del-row-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .submit-btn {
            background: #0066cc;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 10px;
        }
        .reset-btn {
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .submit-btn:disabled, .reset-btn:disabled, .add-row-btn:disabled, .del-row-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>在建工程项目安全管理工作周报填报</h1>
            <div class="user-info">
                <span>当前项目：<span id="currentProject">--</span></span>
                <button class="back-btn" id="backBtn">返回选择页</button>
                <button class="logout-btn" id="logoutBtn">退出登录</button>
            </div>
        </div>

        <form id="weeklyForm">
            <!-- 一、项目基础信息 -->
            <div class="section-title">一、项目基础信息</div>
            <div class="form-row">
                <div class="form-group">
                    <label>项目名称</label>
                    <input type="text" id="weekly_projectName" readonly>
                </div>
                <div class="form-group">
                    <label>项目类型</label>
                    <select id="weekly_projectType" name="weekly_projectType" required>
                        <option value="光伏EPC">光伏EPC</option>
                        <option value="风电EPC">风电EPC</option>
                        <option value="储能EPC">储能EPC</option>
                        <option value="改造EPC">改造EPC</option>
                        <option value="综合智慧能源EPC">综合智慧能源EPC</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>项目负责人</label>
                    <input type="text" id="weekly_projectLeader" placeholder="请输入项目负责人姓名" required>
                </div>
                <div class="form-group">
                    <label>执行部门</label>
                    <input type="text" id="weekly_executiveDepartment" placeholder="请输入执行部门" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>周报周期开始日期</label>
                    <input type="date" id="weekly_reportStartDate" required>
                </div>
                <div class="form-group">
                    <label>周报周期结束日期</label>
                    <input type="date" id="weekly_reportEndDate" required>
                </div>
                <div class="form-group">
                    <label>填报人</label>
                    <input type="text" id="weekly_reporter" required placeholder="请输入填报人姓名">
                </div>
                <div class="form-group">
                    <label>填报日期</label>
                    <input type="date" id="weekly_reportDate" required>
                </div>
            </div>

            <!-- 二、本周安全管理工作数据 -->
            <div class="section-title">二、本周安全管理工作数据</div>
            <div class="form-row">
                <div class="form-group">
                    <label>安全检查次数</label>
                    <input type="number" id="weekly_safetyInspectionCount" min="0" placeholder="请输入数字" value="0" required>
                </div>
                <div class="form-group">
                    <label>发现隐患数量</label>
                    <input type="number" id="weekly_hiddenDangerFoundCount" min="0" placeholder="请输入数字" value="0" required>
                </div>
                <div class="form-group">
                    <label>整改完成数量</label>
                    <input type="number" id="weekly_hiddenDangerRectifiedCount" min="0" placeholder="请输入数字" value="0" required>
                </div>
                <div class="form-group">
                    <label>重大隐患数量</label>
                    <input type="number" id="weekly_majorHiddenDangerCount" min="0" placeholder="请输入数字" value="0" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>安全培训次数</label>
                    <input type="number" id="weekly_trainingPersonTimes" min="0" placeholder="请输入数字" value="0" required>
                </div>
                <div class="form-group">
                    <label>应急演练次数</label>
                    <input type="number" id="weekly_emergencyDrillCount" min="0" placeholder="请输入数字" value="0" required>
                </div>
                <div class="form-group">
                    <label>本周安全事故数量</label>
                    <input type="number" id="weekly_accidentCount" min="0" placeholder="请输入数字" value="0" required>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="weekly_remark" placeholder="请输入其他需要说明的内容">
                </div>
            </div>

            <!-- 三、本周隐患整改明细表 -->
            <div class="section-title">三、本周隐患整改明细表</div>
            <div class="table-box">
                <table id="weeklyDangerTable">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>隐患描述</th>
                            <th>隐患等级</th>
                            <th>整改措施</th>
                            <th>整改完成时间</th>
                            <th>验证人</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                            <td>
                                <select class="weekly-danger-input" required>
                                    <option value="一般">一般</option>
                                    <option value="较大">较大</option>
                                    <option value="重大">重大</option>
                                </select>
                            </td>
                            <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                            <td><input type="date" class="weekly-danger-input" required></td>
                            <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                            <td><button type="button" class="del-row-btn">删除</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button type="button" class="add-row-btn" id="addRowBtn">添加一行</button>

            <!-- 提交按钮 -->
            <div style="text-align: center; margin-top: 30px;">
                <button type="button" class="submit-btn" id="submitBtn">提交周报数据</button>
                <button type="reset" class="reset-btn" id="resetBtn">清空表单</button>
            </div>
        </form>
    </div>

    <script>
        // ================ 核心修复1：全局变量&核心函数提前定义，挂载到window，确保内联/事件可访问 ================
        // 全局配置
        const SUPABASE_URL = "https://zmbxpsbxxjrsdzyvtiyi.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7zW8CxAae1sFTxNLqaSjTA_nkCkzD8T";
        
        // 全局状态
        window.isProcessing = false;
        window.currentUser = null;
        window.supabaseClient = null;

        // ================ 核心修复2：所有操作函数挂载到window全局，彻底解决作用域问题 ================
        // 更新表格序号（全局可访问）
        window.updateWeeklyRowNumbers = function() {
            try {
                const tableBody = document.querySelector('#weeklyDangerTable tbody');
                if (!tableBody) {
                    console.error('【错误】未找到隐患明细表tbody');
                    return;
                }
                const rows = tableBody.querySelectorAll('tr');
                rows.forEach((row, index) => {
                    const numCell = row.querySelector('td:first-child');
                    if (numCell) numCell.textContent = index + 1;
                });
                console.log('【日志】序号更新成功');
            } catch (e) {
                console.error('【错误】序号更新失败：', e);
            }
        };

        // 删除行（全局可访问）
        window.delRow = function(btn) {
            if (window.isProcessing) {
                console.log('【日志】操作进行中，拦截删除请求');
                return;
            }
            try {
                // 兼容写法，解决closest兼容性问题
                let row = btn.parentNode;
                while (row && row.tagName !== 'TR') {
                    row = row.parentNode;
                }
                if (!row) {
                    alert('未找到要删除的行');
                    return;
                }
                const tableBody = row.parentElement;
                const rows = tableBody.querySelectorAll('tr');
                
                // 保留至少1行数据
                if (rows.length <= 1) {
                    alert('至少需要保留1行隐患明细数据！');
                    return;
                }
                
                tableBody.removeChild(row);
                window.updateWeeklyRowNumbers();
                console.log('【日志】行删除成功');
            } catch (e) {
                console.error('【错误】删除行失败：', e);
                alert('删除失败：' + e.message);
            }
        };

        // 新增行（全局可访问，核心修复）
        window.addWeeklyDangerRow = function() {
            if (window.isProcessing) {
                console.log('【日志】操作进行中，拦截新增请求');
                return;
            }
            window.isProcessing = true;
            console.log('【日志】开始执行新增行逻辑');

            try {
                const tableBody = document.querySelector('#weeklyDangerTable tbody');
                if (!tableBody) {
                    throw new Error('未找到隐患明细表的tbody元素，请检查表格ID是否正确');
                }
                const rows = tableBody.querySelectorAll('tr');
                const newIndex = rows.length + 1;
                
                // 创建新行
                const newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td>${newIndex}</td>
                    <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                    <td>
                        <select class="weekly-danger-input" required>
                            <option value="一般">一般</option>
                            <option value="较大">较大</option>
                            <option value="重大">重大</option>
                        </select>
                    </td>
                    <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                    <td><input type="date" class="weekly-danger-input" required></td>
                    <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                    <td><button type="button" class="del-row-btn">删除</button></td>
                `;
                tableBody.appendChild(newRow);
                
                // 给新行的删除按钮绑定事件
                const delBtn = newRow.querySelector('.del-row-btn');
                delBtn.addEventListener('click', function() {
                    window.delRow(this);
                });
                
                // 更新序号
                window.updateWeeklyRowNumbers();
                console.log('【日志】新增行成功，当前行数：', newIndex);
                alert('新增行成功！');

            } catch (e) {
                console.error('【错误】新增行失败：', e);
                alert('新增行失败：' + e.message);
            } finally {
                // 无论成功失败，都重置状态，避免永久锁定
                window.isProcessing = false;
            }
        };

        // 表单重置函数
        window.resetForm = function() {
            if (window.isProcessing) return;
            document.getElementById('weeklyForm').reset();
            // 重置后重新填充项目名称
            document.getElementById('weekly_projectName').value = window.currentUser?.project_name || '';
            // 重置表格为初始状态
            const tableBody = document.querySelector('#weeklyDangerTable tbody');
            tableBody.innerHTML = `
                <tr>
                    <td>1</td>
                    <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                    <td>
                        <select class="weekly-danger-input" required>
                            <option value="一般">一般</option>
                            <option value="较大">较大</option>
                            <option value="重大">重大</option>
                        </select>
                    </td>
                    <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                    <td><input type="date" class="weekly-danger-input" required></td>
                    <td><input type="text" class="weekly-danger-input" placeholder="请输入" required></td>
                    <td><button type="button" class="del-row-btn">删除</button></td>
                </tr>
            `;
            // 重新绑定初始行的删除事件
            const initDelBtn = tableBody.querySelector('.del-row-btn');
            initDelBtn.addEventListener('click', function() {
                window.delRow(this);
            });
        };

        // 周数计算工具函数
        window.getWeekNumber = function(date) {
            const startOfYear = new Date(date.getFullYear(), 0, 1);
            const dayOfYear = Math.floor((date - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
            return Math.ceil(dayOfYear / 7);
        };

        // ================ 页面加载完成后执行初始化 ================
        window.addEventListener('DOMContentLoaded', async function() {
            console.log('【日志】页面DOM加载完成，开始初始化');
            // 1. 初始化Supabase客户端，增加容错，避免阻塞后续代码
            try {
                const { createClient } = window.supabase;
                window.supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('【日志】Supabase客户端初始化成功');
            } catch (e) {
                console.error('【错误】Supabase初始化失败：', e);
                alert('系统初始化失败，部分功能可能异常，请刷新页面重试');
            }

            // 2. 登录状态校验
            try {
                const userStr = localStorage.getItem('currentUser');
                if (!userStr) {
                    alert('未检测到登录信息，请重新登录');
                    window.location.href = 'index.html';
                    return;
                }
                window.currentUser = JSON.parse(userStr);
                if (!window.currentUser.id || !window.currentUser.username || !window.currentUser.project_name) {
                    throw new Error('用户信息不完整');
                }
                // 填充项目信息
                document.getElementById('currentProject').innerText = window.currentUser.project_name;
                document.getElementById('weekly_projectName').value = window.currentUser.project_name;
                console.log('【日志】用户信息加载成功：', window.currentUser.project_name);
            } catch (e) {
                console.error('【错误】用户信息解析失败：', e);
                localStorage.removeItem('currentUser');
                alert('登录状态异常，请重新登录');
                window.location.href = 'index.html';
                return;
            }

            // 3. 绑定所有按钮事件（替代内联onclick，更稳定）
            // 新增行按钮
            document.getElementById('addRowBtn').addEventListener('click', window.addWeeklyDangerRow);
            // 初始行删除按钮
            const initDelBtn = document.querySelector('#weeklyDangerTable .del-row-btn');
            if (initDelBtn) {
                initDelBtn.addEventListener('click', function() {
                    window.delRow(this);
                });
            }
            // 返回选择页按钮
            document.getElementById('backBtn').addEventListener('click', function() {
                if (window.isProcessing) return;
                window.location.href = 'select.html';
            });
            // 退出登录按钮
            document.getElementById('logoutBtn').addEventListener('click', function() {
                if (window.isProcessing) return;
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            });
            // 重置按钮
            document.getElementById('resetBtn').addEventListener('click', window.resetForm);
            // 提交按钮
            document.getElementById('submitBtn').addEventListener('click', submitWeeklyForm);

            console.log('【日志】页面初始化完成，所有事件绑定成功');
        });

        // ================ 表单提交函数 ================
        async function submitWeeklyForm() {
            if (window.isProcessing) return;
            window.isProcessing = true;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;

            try {
                // 表单基础验证
                const form = document.getElementById('weeklyForm');
                if (!form.checkValidity()) {
                    alert('请填写所有必填项！');
                    form.reportValidity();
                    return;
                }

                // 日期逻辑校验
                const weekStart = document.getElementById('weekly_reportStartDate').value;
                const weekEnd = document.getElementById('weekly_reportEndDate').value;
                const startDate = new Date(weekStart);
                const endDate = new Date(weekEnd);
                
                if (startDate > endDate) {
                    alert('开始日期不能晚于结束日期！');
                    return;
                }
                const dayDiff = (endDate - startDate) / (1000 * 60 * 60 * 24) + 1;
                if (dayDiff > 7) {
                    alert('周报周期不能超过7天！');
                    return;
                }

                // 周数计算
                const weekYear = startDate.getFullYear();
                const weekNum = window.getWeekNumber(startDate);
                const weekMonth = startDate.getMonth() + 1;

                // 收集主表数据
                const weeklyData = {
                    user_id: window.currentUser.id,
                    project_name: document.getElementById('weekly_projectName').value,
                    project_type: document.getElementById('weekly_projectType').value,
                    project_leader: document.getElementById('weekly_projectLeader').value.trim(),
                    executive_department: document.getElementById('weekly_executiveDepartment').value.trim(),
                    report_start_date: weekStart,
                    report_end_date: weekEnd,
                    report_week: `${weekYear}年第${weekNum}周（${weekMonth}月）`,
                    reporter: document.getElementById('weekly_reporter').value.trim(),
                    report_date: document.getElementById('weekly_reportDate').value,
                    safety_inspection_count: Number(document.getElementById('weekly_safetyInspectionCount').value) || 0,
                    hidden_danger_found_count: Number(document.getElementById('weekly_hiddenDangerFoundCount').value) || 0,
                    hidden_danger_rectified_count: Number(document.getElementById('weekly_hiddenDangerRectifiedCount').value) || 0,
                    major_hidden_danger_count: Number(document.getElementById('weekly_majorHiddenDangerCount').value) || 0,
                    training_person_times: Number(document.getElementById('weekly_trainingPersonTimes').value) || 0,
                    emergency_drill_count: Number(document.getElementById('weekly_emergencyDrillCount').value) || 0,
                    accident_count: Number(document.getElementById('weekly_accidentCount').value) || 0,
                    remark: document.getElementById('weekly_remark').value.trim(),
                    created_at: new Date().toISOString()
                };

                // 提交主表数据
                const { data: reportData, error: reportError } = await window.supabaseClient
                    .from('safety_weekly_report')
                    .insert([weeklyData])
                    .select('id')
                    .single();

                if (reportError) throw reportError;

                // 收集隐患明细数据
                const dangerRows = document.querySelectorAll('#weeklyDangerTable tbody tr');
                const dangerData = [];
                
                dangerRows.forEach((row, index) => {
                    const inputs = row.querySelectorAll('.weekly-danger-input');
                    dangerData.push({
                        report_id: reportData.id,
                        serial_number: index + 1,
                        danger_description: inputs[0].value.trim(),
                        danger_level: inputs[1].value,
                        treatment_description: inputs[2].value.trim(),
                        treatment_deadline: inputs[3].value,
                        verify_person: inputs[4].value.trim(),
                        project_name: window.currentUser.project_name
                    });
                });

                // 提交隐患明细
                if (dangerData.length > 0) {
                    const { error: dangerError } = await window.supabaseClient
                        .from('weekly_danger_detail')
                        .insert(dangerData);
                    
                    if (dangerError) throw dangerError;
                }

                alert('周报提交成功！');
                window.resetForm();

            } catch (error) {
                console.error('【错误】周报提交失败：', error);
                alert('周报提交失败：' + (error.message || '未知错误，请联系管理员'));
            } finally {
                window.isProcessing = false;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
