<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全管理系统-周报填报</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background-color: #f5f7fa; padding: 20px; }
        .header { 
            background: linear-gradient(90deg, #003366, #0066cc);
            color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 22px; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .back-btn, .logout-btn { 
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .section-title { 
            background: #e6f0ff;
            padding: 10px 15px;
            margin: 25px 0 15px 0;
            border-left: 5px solid #0066cc;
            font-weight: bold;
            color: #003366;
            font-size: 16px;
        }
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .table-box { width: 100%; overflow-x: auto; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { border: 1px solid #ddd; padding: 8px 10px; font-size: 13px; text-align: left; }
        table th { background: #f0f5ff; color: #003366; font-weight: 600; }
        .add-row-btn { 
            background: #28a745;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        .del-row-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .submit-btn {
            background: #0066cc;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 10px;
        }
        .reset-btn {
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>在建工程项目安全管理工作周报填报</h1>
            <div class="user-info">
                <span>当前项目：<span id="currentProject"></span></span>
                <button class="back-btn" onclick="goBack()">返回选择页</button>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>

        <form id="weeklyForm">
            <!-- 一、项目基础信息 -->
            <div class="section-title">一、项目基础信息</div>
            <div class="form-row">
                <div class="form-group">
                    <label>项目名称</label>
                    <input type="text" id="weekly_projectName" readonly>
                </div>
                <div class="form-group">
                    <label>项目类型</label>
                    <select id="weekly_projectType" name="weekly_projectType">
                        <option value="光伏EPC">光伏EPC</option>
                        <option value="风电EPC">风电EPC</option>
                        <option value="储能EPC">储能EPC</option>
                        <option value="改造EPC">改造EPC</option>
                        <option value="综合智慧能源EPC">综合智慧能源EPC</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>项目负责人</label>
                    <input type="text" id="weekly_projectLeader" placeholder="请输入项目负责人姓名">
                </div>
                <div class="form-group">
                    <label>执行部门</label>
                    <input type="text" id="weekly_executiveDepartment" placeholder="请输入执行部门">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>周报周期开始日期</label>
                    <input type="date" id="weekly_reportStartDate" required>
                </div>
                <div class="form-group">
                    <label>周报周期结束日期</label>
                    <input type="date" id="weekly_reportEndDate" required>
                </div>
                <div class="form-group">
                    <label>填报人</label>
                    <input type="text" id="weekly_reporter" required placeholder="请输入填报人姓名">
                </div>
                <div class="form-group">
                    <label>填报日期</label>
                    <input type="date" id="weekly_reportDate" required>
                </div>
            </div>

            <!-- 二、本周安全管理工作数据 -->
            <div class="section-title">二、本周安全管理工作数据</div>
            <div class="form-row">
                <div class="form-group">
                    <label>安全检查次数</label>
                    <input type="number" id="weekly_safetyInspectionCount" min="0" placeholder="请输入数字" value="0">
                </div>
                <div class="form-group">
                    <label>发现隐患数量</label>
                    <input type="number" id="weekly_hiddenDangerFoundCount" min="0" placeholder="请输入数字" value="0">
                </div>
                <div class="form-group">
                    <label>整改完成数量</label>
                    <input type="number" id="weekly_hiddenDangerRectifiedCount" min="0" placeholder="请输入数字" value="0">
                </div>
                <div class="form-group">
                    <label>重大隐患数量</label>
                    <input type="number" id="weekly_majorHiddenDangerCount" min="0" placeholder="请输入数字" value="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>安全培训次数</label>
                    <input type="number" id="weekly_trainingPersonTimes" min="0" placeholder="请输入数字" value="0">
                </div>
                <div class="form-group">
                    <label>应急演练次数</label>
                    <input type="number" id="weekly_emergencyDrillCount" min="0" placeholder="请输入数字" value="0">
                </div>
                <div class="form-group">
                    <label>本周安全事故数量</label>
                    <input type="number" id="weekly_accidentCount" min="0" placeholder="请输入数字" value="0">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="weekly_remark" placeholder="请输入其他需要说明的内容">
                </div>
            </div>

            <!-- 三、本周隐患整改明细表 -->
            <div class="section-title">三、本周隐患整改明细表</div>
            <div class="table-box">
                <table id="weeklyDangerTable">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>隐患描述</th>
                            <th>隐患等级</th>
                            <th>整改措施</th>
                            <th>整改完成时间</th>
                            <th>验证人</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                            <td>
                                <select class="weekly-danger-input">
                                    <option value="一般">一般</option>
                                    <option value="较大">较大</option>
                                    <option value="重大">重大</option>
                                </select>
                            </td>
                            <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                            <td><input type="date" class="weekly-danger-input"></td>
                            <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                            <td><button type="button" class="del-row-btn" onclick="delRow(this)">删除</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button type="button" class="add-row-btn" onclick="addWeeklyDangerRow()">添加一行</button>

            <!-- 提交按钮 -->
            <div style="text-align: center; margin-top: 30px;">
                <button type="button" class="submit-btn" onclick="submitWeeklyForm()">提交周报数据</button>
                <button type="reset" class="reset-btn">清空表单</button>
            </div>
        </form>
    </div>

    <script>
        // ========== 替换成你自己的Supabase配置 ==========
        const SUPABASE_URL = "https://zmbxpsbxxjrsdzyvtiyi.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7zW8CxAae1sFTxNLqaSjTA_nkCkzD8T";
        // ==============================================

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        // 页面加载验证登录（强制校验）
        window.onload = async function() {
            // 1. 强制校验登录状态
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
                return;
            }

            // 2. 校验用户信息完整性
            try {
                currentUser = JSON.parse(userStr);
                if (!currentUser.id || !currentUser.username || !currentUser.project_name) {
                    localStorage.removeItem('currentUser');
                    window.location.href = 'login.html';
                    return;
                }
                // 3. 填充项目信息
                document.getElementById('currentProject').innerText = currentUser.project_name;
                document.getElementById('weekly_projectName').value = currentUser.project_name;
            } catch (e) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        };

        // 返回选择页
        function goBack() {
            window.location.href = 'select.html';
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        // 添加周报隐患行
        function addWeeklyDangerRow() {
            const tableBody = document.querySelector('#weeklyDangerTable tbody');
            const rows = tableBody.querySelectorAll('tr');
            const newIndex = rows.length + 1;
            
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${newIndex}</td>
                <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                <td>
                    <select class="weekly-danger-input">
                        <option value="一般">一般</option>
                        <option value="较大">较大</option>
                        <option value="重大">重大</option>
                    </select>
                </td>
                <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                <td><input type="date" class="weekly-danger-input"></td>
                <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                <td><button type="button" class="del-row-btn" onclick="delRow(this)">删除</button></td>
            `;
            tableBody.appendChild(newRow);
            
            // 更新序号
            updateWeeklyRowNumbers();
        }

        // 删除行
        function delRow(btn) {
            const row = btn.closest('tr');
            const tableBody = row.parentElement;
            tableBody.removeChild(row);
            
            // 更新序号
            updateWeeklyRowNumbers();
        }

        // 更新周报行序号
        function updateWeeklyRowNumbers() {
            const tableBody = document.querySelector('#weeklyDangerTable tbody');
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach((row, index) => {
                row.querySelector('td:first-child').textContent = index + 1;
            });
        }

        // 修复后的周报提交函数
        async function submitWeeklyForm() {
            const weekStart = document.getElementById('weekly_reportStartDate').value;
            const weekEnd = document.getElementById('weekly_reportEndDate').value;
            
            // 基础校验
            if (!weekStart || !weekEnd) {
                alert('请填写周报周期日期！');
                return;
            }
            if (new Date(weekStart) > new Date(weekEnd)) {
                alert('开始日期不能晚于结束日期！');
                return;
            }

            // 计算周数
            const weekYear = new Date(weekStart).getFullYear();
            const weekMonth = new Date(weekStart).getMonth() + 1;
            const weekNum = Math.ceil(new Date(weekStart).getDate() / 7);

            // 收集表单数据
            const weeklyData = {
                user_id: currentUser.id,
                project_name: document.getElementById('weekly_projectName').value,
                project_type: document.getElementById('weekly_projectType').value,
                project_leader: document.getElementById('weekly_projectLeader').value,
                executive_department: document.getElementById('weekly_executiveDepartment').value,
                report_start_date: weekStart,
                report_end_date: weekEnd,
                report_week: `${weekYear}-${weekMonth}月第${weekNum}周`,
                reporter: document.getElementById('weekly_reporter').value,
                report_date: document.getElementById('weekly_reportDate').value,
                safety_inspection_count: parseInt(document.getElementById('weekly_safetyInspectionCount').value) || 0,
                hidden_danger_found_count: parseInt(document.getElementById('weekly_hiddenDangerFoundCount').value) || 0,
                hidden_danger_rectified_count: parseInt(document.getElementById('weekly_hiddenDangerRectifiedCount').value) || 0,
                major_hidden_danger_count: parseInt(document.getElementById('weekly_majorHiddenDangerCount').value) || 0,
                training_person_times: parseInt(document.getElementById('weekly_trainingPersonTimes').value) || 0,
                emergency_drill_count: parseInt(document.getElementById('weekly_emergencyDrillCount').value) || 0,
                accident_count: parseInt(document.getElementById('weekly_accidentCount').value) || 0,
                remark: document.getElementById('weekly_remark').value,
                created_at: new Date().toISOString()
            };

            try {
                // 提交主表数据
                const { data: reportData, error: reportError } = await supabase
                    .from('safety_weekly_report')
                    .insert([weeklyData])
                    .select('id')
                    .single();

                if (reportError) throw reportError;

                // 收集隐患明细数据
                const dangerRows = document.querySelectorAll('#weeklyDangerTable tbody tr');
                const dangerData = [];
                
                dangerRows.forEach((row, index) => {
                    const inputs = row.querySelectorAll('.weekly-danger-input');
                    dangerData.push({
                        report_id: reportData.id,
                        serial_number: index + 1,
                        danger_description: inputs[0].value,
                        danger_level: inputs[1].value,
                        treatment_description: inputs[2].value,
                        treatment_deadline: inputs[3].value,
                        verify_person: inputs[4].value,
                        project_name: currentUser.project_name
                    });
                });

                // 提交隐患明细
                if (dangerData.length > 0) {
                    const { error: dangerError } = await supabase
                        .from('weekly_danger_detail')
                        .insert(dangerData);
                    
                    if (dangerError) throw dangerError;
                }

                alert('周报提交成功！');
                document.getElementById('weeklyForm').reset();
                
                // 重置表格为初始状态
                const tableBody = document.querySelector('#weeklyDangerTable tbody');
                tableBody.innerHTML = `
                    <tr>
                        <td>1</td>
                        <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                        <td>
                            <select class="weekly-danger-input">
                                <option value="一般">一般</option>
                                <option value="较大">较大</option>
                                <option value="重大">重大</option>
                            </select>
                        </td>
                        <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                        <td><input type="date" class="weekly-danger-input"></td>
                        <td><input type="text" class="weekly-danger-input" placeholder="请输入"></td>
                        <td><button type="button" class="del-row-btn" onclick="delRow(this)">删除</button></td>
                    </tr>
                `;

            } catch (error) {
                console.error('周报提交失败：', error);
                alert('周报提交失败：' + error.message);
            }
        }
    </script>
</body>
</html>
